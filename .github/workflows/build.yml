name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Set version code
        run: |
          # 从 pubspec.yaml 读取版本号，提取最后一位作为 versionCode（确保递增）
          VERSION_NAME=$(grep "^version:" pubspec.yaml | awk '{print $2}')
          PATCH=$(echo "$VERSION_NAME" | rev | cut -d'.' -f1 | rev)
          VERSION_CODE=$((2000 + PATCH))  # 2.0.1 → 2001, 2.0.2 → 2002
          echo "flutter.versionCode=$VERSION_CODE" > android/local.properties
          echo "flutter.versionName=$VERSION_NAME" >> android/local.properties
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"
          cat android/local.properties
       
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
