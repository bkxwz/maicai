name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore guacaibao.keystore \
            -alias guacaibao \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Guacaibao, OU=Personal, O=Personal, L=Unknown, ST=Unknown, C=CN" \
            -storepass android \
            -keypass android
          
          echo "=== BASE64 KEYSTORE (copy everything below) ===="
          base64 -w 0 guacaibao.keystore
          echo ""
          echo "=== END ===="
          echo ""
          echo "Go to: https://github.com/bkxwz/maicai/settings/secrets/actions"
          echo "Create secret named: KEYSTORE_BASE64"
          echo "Paste the base64 string above (without newlines)"
