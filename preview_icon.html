<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用图标预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .icons-row {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .icon-wrapper {
            text-align: center;
        }
        
        .icon-label {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 15px;
        }
        
        .icon-container {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        
        .icon-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            border-radius: 30px 30px 0 0;
        }
        
        .icon-container img {
            display: block;
            position: relative;
            z-index: 1;
        }
        
        .icon-container.small {
            border-radius: 20px;
            padding: 15px;
        }
        
        .icon-container.small::before {
            border-radius: 20px 20px 0 0;
        }
        
        .phone-mockup {
            width: 280px;
            background: #f5f5f5;
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            margin-top: 50px;
        }
        
        .phone-screen {
            background: #4CAF50;
            border-radius: 30px;
            padding: 40px 20px 20px;
            text-align: center;
        }
        
        .phone-screen .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .phone-screen .icon-container::before {
            border-radius: 20px 20px 0 0;
        }
        
        .phone-screen .app-name {
            color: white;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .phone-notch {
            width: 100px;
            height: 25px;
            background: #333;
            border-radius: 0 0 15px 15px;
            margin: -15px auto 15px;
        }
        
        .instructions {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥬 卖菜记账 - 应用图标</h1>
        
        <div class="icons-row">
            <div class="icon-wrapper">
                <div class="icon-container small">
                    <img src="android/app/src/main/res/mipmap-mdpi/ic_launcher.png" width="48" height="48" alt="mdpi">
                </div>
                <div class="icon-label">48x48 mdpi</div>
            </div>
            
            <div class="icon-wrapper">
                <div class="icon-container small">
                    <img src="android/app/src/main/res/mipmap-hdpi/ic_launcher.png" width="72" height="72" alt="hdpi">
                </div>
                <div class="icon-label">72x72 hdpi</div>
            </div>
            
            <div class="icon-wrapper">
                <div class="icon-container">
                    <img src="android/app/src/main/res/mipmap-xhdpi/ic_launcher.png" width="96" height="96" alt="xhdpi">
                </div>
                <div class="icon-label">96x96 xhdpi</div>
            </div>
            
            <div class="icon-wrapper">
                <div class="icon-container" style="padding: 25px;">
                    <img src="android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png" width="144" height="144" alt="xxhdpi">
                </div>
                <div class="icon-label">144x144 xxhdpi</div>
            </div>
            
            <div class="icon-wrapper">
                <div class="icon-container" style="padding: 30px;">
                    <img src="android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" width="192" height="192" alt="xxxhdpi">
                </div>
                <div class="icon-label">192x192 xxxhdpi</div>
            </div>
        </div>
        
        <div class="phone-mockup">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div class="icon-container">
                    <img src="android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" width="50" height="50" alt="phone">
                </div>
                <div class="app-name">卖菜记账</div>
            </div>
        </div>
        
        <div class="instructions">
            在浏览器中打开此HTML文件预览图标效果
        </div>
    </div>
</body>
</html>
